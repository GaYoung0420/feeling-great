<!doctype html>
<!-- ============================================================
     index.html — 앱 진입점 (메인 페이지)

     역할:
       - HTML 구조 정의 및 메타 설정
       - CSS, JS 파일 로드
       - React 앱이 마운트되는 #root 제공

     로드 파일:
       css/styles.css  — Tailwind CSS 전역 스타일
       js/bundle.js    — 라이브러리 + 앱 전체 코드
     ============================================================ -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="res/image.png" />
    <title>필링 그레이트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/dialog-theme.css" />
  </head>
  <body>
    <!-- React 앱이 렌더링되는 루트 컨테이너 -->
    <div id="root"></div>

    <!-- 라이브러리(React/Supabase) + 앱 컴포넌트 전체 번들 -->
    <script type="module" src="js/bundle.js"></script>
  </body>
</html>
